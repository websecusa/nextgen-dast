# Author: Tim Rice <tim.j.rice@hackrange.com>
# Part of nextgen-dast 2.1.1. See README.md for license and overall architecture.
#
# Drop-in nginx snippet that rate-limits the pentest-proxy login form
# and makes the upstream see real client IPs (so fail2ban and the app's
# audit log can ban the attacker, not the load balancer).
#
# Install:
#   1. Copy this file to /etc/nginx/conf.d/nextgen-dast-login.conf
#      (or include it from the existing fairtprm.com server block).
#   2. Edit set_real_ip_from below to match YOUR load-balancer egress
#      CIDR(s). The default of 173.231.62.181/32 matches the public IP
#      of fairtprm.com itself; if you front nextgen-dast with another
#      LB (Cloudflare, AWS ALB, an internal HAProxy), add those ranges.
#   3. Reload nginx: nginx -t && systemctl reload nginx
#
# Layout:
#   - http{} block:    set_real_ip_from + limit_req_zone
#   - server{} block:  the location-level limit_req for /test/login

# ---- http{} block — placed once, alongside other limit_req_zones ----------
# Trust X-Forwarded-For only when it arrives from a known LB. Without
# this, an attacker could spoof the header and bypass the rate limit.
# Add one set_real_ip_from line per upstream proxy you trust.
set_real_ip_from 173.231.62.181/32;
real_ip_header   X-Forwarded-For;
real_ip_recursive on;

# 5 requests/minute per real client IP, with a 5-request burst. Bursts
# above 5 in 60s return 503 and never reach the app — so neither the
# app's audit log nor the bcrypt cost are exercised by a flood.
# 10 MB of zone state holds ≈ 160k unique IPs, plenty for an internal
# tool. Tune up if you front a wider audience.
limit_req_zone $binary_remote_addr zone=ngdast_login:10m rate=5r/m;
limit_req_status 429;

# ---- server{} block — inside the fairtprm.com (or equivalent) vhost --------
#
#   location = /test/login {
#       limit_req zone=ngdast_login burst=5 nodelay;
#       proxy_pass http://127.0.0.1:8888;
#       proxy_set_header Host              $host;
#       proxy_set_header X-Real-IP         $remote_addr;
#       proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
# Notes
# -----
# * The `= /test/login` exact-match block sits BEFORE the generic
#   /test/ prefix block so the limit only applies to the login POST,
#   not to /test/static/* or scan output streams.
# * GET /test/login (rendering the form) is also rate-limited; that's
#   intentional — a brute-forcer typically GETs to fish CSRF tokens
#   between attempts, so limiting both halves caps the loop rate.
# * To exempt your office IP from the limit: add a
#       geo $no_login_limit { default 0; 198.51.100.0/24 1; }
#   block in http{} and use `limit_req zone=ngdast_login burst=5 nodelay
#   if=$is_office`.
