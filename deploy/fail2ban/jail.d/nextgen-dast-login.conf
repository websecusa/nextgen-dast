# Author: Tim Rice <tim.j.rice@hackrange.com>
# Part of nextgen-dast 2.1.1. See README.md for license and overall architecture.
#
# fail2ban jail: ban IPs that fail nextgen-dast login N times in T window.
#
# Install: /etc/fail2ban/jail.d/nextgen-dast-login.conf
# Reload : fail2ban-client reload
#
# IMPORTANT — do not lock out the load balancer
# ---------------------------------------------
# fail2ban watches the nginx access log, where $remote_addr is the
# nginx-resolved real IP. Make sure nginx is configured with the
# matching `set_real_ip_from <LB_CIDR>` directive (see
# deploy/nginx/login-rate-limit.conf) BEFORE enabling this jail —
# otherwise every failed login gets attributed to the load balancer's
# own IP and the first round of bans takes the whole site down.
#
# Tunables you probably want to edit
# ----------------------------------
# logpath  : where your nginx access log lives.
# ignoreip : trusted networks that must NEVER be banned (your office
#            CIDR, monitoring probes, the LB itself as a belt-and-
#            braces fallback).
# maxretry : 5 failed logins is generous — the limit_req zone already
#            caps unauthenticated rate to 5/min, so 5 hits here
#            implies sustained brute force, not fat-fingering.
# findtime : window the maxretry counter accumulates over.
# bantime  : how long to drop traffic. -1 for permanent.

[nextgen-dast-login]
enabled  = true
filter   = nextgen-dast-login
port     = http,https
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 10m
bantime  = 1h

# REPLACE the placeholders below with the real CIDRs for your
# environment before enabling. Leave a generous allowlist; banning a
# legitimate operator out of their own admin tool is worse than
# missing one extra brute-force attempt.
ignoreip = 127.0.0.1/8 ::1
#         <yourhostip>/32      # the LB itself, in case real_ip is misconfigured
#         198.51.100.0/24        # office egress
