# Author: Tim Rice <tim.j.rice@hackrange.com>
# Part of nextgen-dast 2.1.1. See README.md for license and overall architecture.
#
# fail2ban filter: matches failed nextgen-dast login attempts in the
# nginx access log. Pairs with deploy/fail2ban/jail.d/nextgen-dast-login.conf.
#
# Install: /etc/fail2ban/filter.d/nextgen-dast-login.conf
#
# Pattern explanation
# -------------------
# After a failed POST /test/login, the application redirects the
# browser to /test/login?error=Invalid+credentials. nginx logs that
# subsequent GET — and that line is the cleanest fail-marker because:
#   1. It only appears after a real authentication failure.
#   2. The POST itself returns 303, so we cannot distinguish success
#      from failure on the POST line alone.
#   3. The redirect-target is verbatim in the URL, so a regex match is
#      reliable across nginx versions.
#
# The filter also catches the brute-force pattern of clients that POST
# repeatedly without following the redirect (some scripts skip GETs);
# they will not match this filter alone, but the nginx limit_req zone
# in deploy/nginx/login-rate-limit.conf handles those at the proxy
# layer.

[Definition]
failregex = ^<HOST> .* "GET /test/login\?error=Invalid\+credentials.*" 200
ignoreregex =
datepattern = ^[^\[]*\[%%d/%%b/%%Y:%%H:%%M:%%S
