<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in — pentest-proxy</title>
  <link rel="stylesheet" href="{{ base }}/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<main style="max-width:420px; margin:6em auto; padding:0 1.2em">
  <p style="text-align:center; margin-bottom:1em">
    <img src="{{ base }}/branding/logo/header" alt="" style="max-height:64px;width:auto"
         onerror="this.style.display='none'">
  </p>
  <h1 style="text-align:center; color: var(--accent); font-weight:700">pentest-proxy</h1>
  <section class="card">
    <h2>Sign in</h2>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="{{ base }}/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label>Username
        <input name="username" required autofocus autocomplete="username">
      </label>
      <label>Password
        <input name="password" type="password" required autocomplete="current-password">
      </label>
      <button type="submit">Sign in</button>
    </form>
  </section>
  <p class="muted" style="text-align:center; font-size:.85em">
    Bootstrap admin credentials are in <code>data/.sensitive_secrets_info_*</code> on the host.
  </p>
</main>
</body>
</html>
