# Negative-control nginx configuration: no autoindex, no extra modules,
# only serves the index.html. Used by the enhanced-testing probe harness
# to assert "no probe should light up against a hardened static server."
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    autoindex off;             # explicit; this is the default but we
                               # restate it to make the intent obvious.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;

    # Standard 404 for any path other than the root index.
    location / {
        try_files $uri $uri/ =404;
    }

    # Lock down the usual victim paths so even an explicit request for
    # /ftp/ etc. comes back 404, not 403 — this matters for probe
    # negative-control tests that look for "no directory listing."
    location = /ftp/ { return 404; }
    location = /uploads/ { return 404; }
    location = /backup/ { return 404; }
    location = /.git/ { return 404; }
}
